name: Python CI with Coverage

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

permissions:
  contents: write   # REQUIRED to push back to repo

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true   # required for push

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov coverage

      - name: Run tests with coverage
        run: |
          pytest --cov=src \
                 --cov-report=term-missing \
                 --cov-report=xml:coverage.xml \
                 --cov-report=html \
                 --cov-fail-under=80 \
                 tests/

      - name: Upload XML coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml-py${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 7

      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v4
        with:
          name: htmlcov-py${{ matrix.python-version }}
          path: htmlcov/
          retention-days: 7

      # Optional: commit HTML coverage back to repo on main+python3.12
      - name: Commit HTML coverage to repository
        if: github.ref == 'refs/heads/main' && matrix.python-version == '3.12'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add htmlcov/
          git commit -m "Update HTML coverage report [skip ci]" || echo "No changes to commit"
          git push

      # Deploy coverage HTML to GitHub Pages
      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main' && matrix.python-version == '3.12'
        uses: actions/deploy-pages@v4
        with:
          folder: htmlcov
